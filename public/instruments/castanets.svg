<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 50" fill="none" stroke="#334155" stroke-width="1.5">
  <!-- Castanets from above: two side by side, each a handle with shell on top -->
  <!-- Left castanet handle -->
  <rect x="7" y="20" width="5" height="28" rx="2" fill="#d4a373"/>
  <!-- Left shell -->
  <circle cx="9.5" cy="14" r="8" fill="#6b3a2a" stroke="#334155"/>
  <!-- Left hinge -->
  <circle cx="9.5" cy="21" r="1.5" fill="#9ca3af" stroke="#334155" stroke-width="0.8"/>
  <!-- Right castanet handle -->
  <rect x="28" y="20" width="5" height="28" rx="2" fill="#d4a373"/>
  <!-- Right shell -->
  <circle cx="30.5" cy="14" r="8" fill="#7a4433" stroke="#334155"/>
  <!-- Right hinge -->
  <circle cx="30.5" cy="21" r="1.5" fill="#9ca3af" stroke="#334155" stroke-width="0.8"/>
</svg>
